[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meshtad"
version = "0.1.0"
description = "Generic Meshtastic store-and-forward daemon with thin SQLite clients"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "meshtastic>=2.7.0",
    "pyserial>=3.5",
]

[project.scripts]
meshcli = "meshtad.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["meshtad"]
